name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/src/**'
      - 'apps/web/app/**'
      - 'apps/web/public/**'
      - 'apps/web/package.json'
      - 'apps/web/wrangler.jsonc'
      - 'apps/web/open-next.config.ts'
      - 'packages/schema/src/**'

jobs:
  # ── 1. Tests & type-checks (always runs on push to main) ─────────────────
  check:
    name: Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  # ── 2. Build + deploy Next.js as Worker via @opennextjs/cloudflare ────────
  deploy-portal:
    name: Deploy Portal Worker (Next.js)
    needs: check
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build & deploy portal to Cloudflare Workers
        run: cd apps/web && npx @opennextjs/cloudflare build && npx @opennextjs/cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
