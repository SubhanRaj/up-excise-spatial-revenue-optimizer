name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which worker to deploy
        required: true
        default: both
        type: choice
        options: [both, portal, worker]
  push:
    branches: [main]
    paths:
      - 'apps/web/src/**'
      - 'apps/web/app/**'
      - 'apps/web/public/**'
      - 'apps/web/package.json'
      - 'apps/web/wrangler.jsonc'
      - 'apps/web/open-next.config.ts'
      - 'apps/worker/src/**'
      - 'apps/worker/package.json'
      - 'apps/worker/wrangler.toml'
      - 'packages/schema/src/**'

jobs:
  # ── 1. Tests & type-checks (always runs on push to main) ─────────────────
  check:
    name: Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  # ── 2. Deploy Hono API Worker ─────────────────────────────────────────────
  deploy-worker:
    name: Deploy API Worker
    needs: check
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'worker') ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy to Cloudflare Workers
        run: pnpm --filter worker exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── 3. Build + deploy Next.js as Worker via @opennextjs/cloudflare ────────
  deploy-portal:
    name: Deploy Portal Worker (Next.js)
    needs: check
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'portal') ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build & deploy portal to Cloudflare Workers
        run: cd apps/web && npx @opennextjs/cloudflare build && npx @opennextjs/cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /login
          NEXT_PUBLIC_WORKER_URL: https://up-excise-spatial-revenue-optimizer.shubhanraj2002.workers.dev
